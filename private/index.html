<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Identity Architecture — Private</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --surface2: #161616;
      --border: #1e1e1e; --gold: #d4a853; --gold-dim: #a07830;
      --text: #e8e0d0; --muted: #6b6560;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; }

    /* Gate */
    #gate { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    #gate.gone { display: none; }
    .gate-box { text-align: center; max-width: 340px; width: 100%; padding: 0 2rem; }
    .gate-title { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 400; margin-bottom: 0.4rem; }
    .gate-sub { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2.5rem; }
    .gate-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.75rem 1rem; font-family: 'Inter', sans-serif; font-size: 0.9rem; border-radius: 6px; outline: none; text-align: center; letter-spacing: 0.15em; }
    .gate-input:focus { border-color: var(--gold-dim); }
    .gate-btn { margin-top: 0.75rem; width: 100%; background: var(--gold); color: #0a0a0a; border: none; padding: 0.75rem; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 6px; cursor: pointer; }
    .gate-btn:hover { background: #e0b560; }
    .gate-error { margin-top: 0.75rem; font-size: 0.78rem; color: #c0604a; letter-spacing: 0.05em; min-height: 1.2em; }
    .gate-spinner { display: none; margin-top: 0.75rem; font-size: 0.78rem; color: var(--muted); }

    /* Main content */
    #main { display: none; max-width: 900px; margin: 0 auto; padding: 4rem 2rem 6rem; }
    header { text-align: center; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 400; color: var(--gold); margin-bottom: 0.5rem; }
    header p { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .stats { display: flex; gap: 2rem; justify-content: center; margin-bottom: 3rem; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-n { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); }
    .stat-l { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

    /* Tag accordion */
    .tag-section { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.75rem; overflow: hidden; }
    .tag-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; cursor: pointer; background: var(--surface); transition: background 0.15s; }
    .tag-header:hover { background: var(--surface2); }
    .tag-header.open { background: var(--surface2); border-bottom: 1px solid var(--border); }
    .tag-name { font-size: 0.85rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gold); }
    .tag-count { font-size: 0.75rem; color: var(--muted); }
    .tag-chevron { font-size: 0.7rem; color: var(--muted); transition: transform 0.2s; }
    .tag-header.open .tag-chevron { transform: rotate(180deg); }
    .tag-body { display: none; padding: 0.5rem 0; }
    .tag-body.open { display: block; }
    .insight { padding: 0.85rem 1.25rem; border-bottom: 1px solid #151515; }
    .insight:last-child { border-bottom: none; }
    .insight-text { font-size: 0.87rem; line-height: 1.6; color: var(--text); margin-bottom: 0.5rem; }
    .insight-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .badge { font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge-public { background: #1a2a1a; color: #5a9a5a; }
    .badge-private { background: #2a1a1a; color: #9a5a5a; }
    .badge-source { background: #1a1a2a; color: #6060a0; }
    .confidence { font-size: 0.65rem; color: var(--muted); }
  </style>
</head>

const TAG_LABELS = {
  'career-arc': 'Career Arc', 'family-relationship': 'Family', 'friend-detail': 'Friends',
  'romantic-relationship': 'Romantic', 'origin-story': 'Origin Story', 'life-event': 'Life Events',
  'core-belief': 'Core Beliefs', 'philosophy': 'Philosophy', 'self-concept': 'Self-Concept',
  'aspiration': 'Aspirations', 'habit-pattern': 'Habits', 'preference': 'Preferences',
  'skill': 'Skills', 'humor-style': 'Humor', 'communication-style': 'Communication',
  'conflict-pattern': 'Conflict', 'love-language': 'Love Language',
  'pride-achievement': 'Pride & Achievement', 'fear-vulnerability': 'Fear & Vulnerability',
  'decision-framework': 'Decision Framework'
};

async function deriveKey(password, saltB64) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const salt = Uint8Array.from(atob(saltB64), c => c.charCodeAt(0));
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

function b64ToBytes(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

async function decrypt(password) {
  const key = await deriveKey(password, PAYLOAD.salt);
  const iv = b64ToBytes(PAYLOAD.iv);
  const authTag = b64ToBytes(PAYLOAD.authTag);
  const encBytes = b64ToBytes(PAYLOAD.data);
  // Concatenate encBytes + authTag (GCM format)
  const combined = new Uint8Array(encBytes.length + authTag.length);
  combined.set(encBytes);
  combined.set(authTag, encBytes.length);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, combined);
  return new TextDecoder().decode(decrypted);
}

function renderInsights(insights) {
  const accordion = document.getElementById('accordion');
  document.getElementById('total-count').textContent = insights.length;
  document.getElementById('public-count').textContent = insights.filter(i => i.privacy === 'public').length;
  document.getElementById('private-count').textContent = insights.filter(i => i.privacy !== 'public').length;

  // Group by tag, sort by count
  const groups = {};
  insights.forEach(i => { (groups[i.tag] = groups[i.tag] || []).push(i); });
  const sorted = Object.entries(groups).sort((a, b) => b[1].length - a[1].length);

  sorted.forEach(([tag, items]) => {
    const label = TAG_LABELS[tag] || tag;
    const sec = document.createElement('div');
    sec.className = 'tag-section';
    sec.innerHTML = `
      <div class="tag-header" onclick="toggleTag(this)">
        <span class="tag-name">${label}</span>
        <span style="display:flex;gap:1rem;align-items:center">
          <span class="tag-count">${items.length} insights</span>
          <span class="tag-chevron">▼</span>
        </span>
      </div>
      <div class="tag-body">
        ${items.map(ins => `
          <div class="insight">
            <div class="insight-text">${ins.insight}</div>
            <div class="insight-meta">
              <span class="badge ${ins.privacy === 'public' ? 'badge-public' : 'badge-private'}">${ins.privacy === 'public' ? '🟢 public' : '🔴 private'}</span>
              ${(ins.sources || []).map(s => `<span class="badge badge-source">${s.collection}</span>`).join('')}
              <span class="confidence">${Math.round((ins.confidence || 1) * 100)}% conf</span>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    accordion.appendChild(sec);
  });
}

function toggleTag(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

async function handleUnlock() {
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('gate-err');
  const spinner = document.getElementById('spinner');
  const btn = document.getElementById('unlock-btn');
  err.textContent = '';
  spinner.style.display = 'block';
  btn.disabled = true;
  try {
    const json = await decrypt(pwd);
    const insights = JSON.parse(json);
    renderInsights(insights);
    sessionStorage.setItem('ip_unlocked', '1');
    sessionStorage.setItem('ip_data', json);
    document.getElementById('gate').classList.add('gone');
    document.getElementById('main').style.display = 'block';
  } catch (e) {
    err.textContent = 'Incorrect password.';
  } finally {
    spinner.style.display = 'none';
    btn.disabled = false;
  }
}

document.getElementById('unlock-btn').addEventListener('click', handleUnlock);
document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') handleUnlock(); });

// Auto-unlock from session
const cached = sessionStorage.getItem('ip_data');
if (cached) {
  try {
    renderInsights(JSON.parse(cached));
    document.getElementById('gate').classList.add('gone');
    document.getElementById('main').style.display = 'block';
  } catch(e) { sessionStorage.removeItem('ip_data'); }
}
</script>
