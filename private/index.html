<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Identity Architecture — Private</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0a;--surface:#111;--surface2:#161616;--border:#1e1e1e;--gold:#d4a853;--text:#e8e0d0;--muted:#6b6560}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh}
    #gate{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column}
    #gate.gone{display:none}
    .gate-box{text-align:center;max-width:320px;width:100%;padding:0 2rem}
    .gate-title{font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:.4rem}
    .gate-sub{font-size:.72rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2.5rem}
    .gate-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.75rem 1rem;font-family:'Inter',sans-serif;font-size:.9rem;border-radius:6px;outline:none;text-align:center;letter-spacing:.15em}
    .gate-input:focus{border-color:#a07830}
    .gate-btn{margin-top:.6rem;width:100%;background:var(--gold);color:#0a0a0a;border:none;padding:.75rem;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;border-radius:6px;cursor:pointer}
    .gate-btn:hover{background:#e0b560}.gate-btn:disabled{opacity:.5;cursor:default}
    .gate-msg{margin-top:.6rem;font-size:.76rem;min-height:1.2em;color:var(--muted)}.gate-msg.err{color:#c05040}
    #main{display:none;max-width:860px;margin:0 auto;padding:4rem 2rem 6rem}
    header{text-align:center;margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
    header h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;color:var(--gold);margin-bottom:.4rem}
    header p{font-size:.72rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
    .stats{display:flex;gap:2rem;justify-content:center;margin-bottom:3rem;flex-wrap:wrap}
    .stat{text-align:center}.stat-n{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold)}
    .stat-l{font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
    .tag-section{border:1px solid var(--border);border-radius:8px;margin-bottom:.6rem;overflow:hidden}
    .tag-header{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;cursor:pointer;background:var(--surface);user-select:none}
    .tag-header:hover,.tag-header.open{background:var(--surface2)}.tag-header.open{border-bottom:1px solid var(--border)}
    .tag-name{font-size:.8rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--gold)}
    .tag-right{display:flex;gap:.75rem;align-items:center}.tag-count{font-size:.72rem;color:var(--muted)}
    .chev{font-size:.65rem;color:var(--muted);transition:transform .2s}.tag-header.open .chev{transform:rotate(180deg)}
    .tag-body{display:none}.tag-body.open{display:block}
    .insight{padding:.8rem 1.2rem;border-bottom:1px solid #131313}.insight:last-child{border-bottom:none}
    .itext{font-size:.85rem;line-height:1.65;color:var(--text);margin-bottom:.45rem}
    .imeta{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
    .badge{font-size:.62rem;padding:.18rem .48rem;border-radius:20px;letter-spacing:.04em;text-transform:uppercase}
    .bp{background:#1a2a1a;color:#5a9a5a}.br{background:#2a1a1a;color:#9a5a5a}.bs{background:#1a1a2a;color:#6060a0}
    .conf{font-size:.62rem;color:var(--muted)}
  </style>
</head>

    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(P.salt),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const enc2=b64(P.data),tag=b64(P.authTag);
    const combined=new Uint8Array(enc2.length+tag.length);combined.set(enc2);combined.set(tag,enc2.length);
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(P.iv)},key,combined);
    const insights=JSON.parse(new TextDecoder().decode(dec));
    sessionStorage.setItem('ipd',JSON.stringify(insights));
    render(insights);
    document.getElementById('gate').classList.add('gone');
    document.getElementById('main').style.display='block';
  }catch(e){msg.className='gate-msg err';msg.textContent='Incorrect password.';btn.disabled=false;}
}
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
function render(insights){
  document.getElementById('sPub').textContent=insights.filter(i=>i.privacy==='public').length;
  document.getElementById('sTotal').textContent=insights.length;
  const groups={};
  insights.forEach(i=>{(groups[i.tag]=groups[i.tag]||[]).push(i)});
  const sorted=Object.entries(groups).sort((a,b)=>b[1].length-a[1].length);
  const acc=document.getElementById('accordion');acc.innerHTML='';
  sorted.forEach(([tag,items])=>{
    const label=TL[tag]||tag;
    const s=document.createElement('div');s.className='tag-section';
    s.innerHTML=`<div class="tag-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
      <span class="tag-name">${label}</span>
      <span class="tag-right"><span class="tag-count">${items.length}</span><span class="chev">▼</span></span>
    </div><div class="tag-body">${items.map(ins=>`
      <div class="insight"><div class="itext">${ins.insight}</div>
      <div class="imeta">
        <span class="badge ${ins.privacy==='public'?'bp':'br'}">${ins.privacy==='public'?'🟢':'🔴'} ${ins.privacy}</span>
        ${(ins.sources||[]).map(s=>`<span class="badge bs">${s.collection}</span>`).join('')}
        <span class="conf">${Math.round((ins.confidence||1)*100)}%</span>
      </div></div>`).join('')}
    </div>`;
    acc.appendChild(s);
  });
}
const cached=sessionStorage.getItem('ipd');
if(cached){try{render(JSON.parse(cached));document.getElementById('gate').classList.add('gone');document.getElementById('main').style.display='block';}catch(e){sessionStorage.removeItem('ipd')}}
</script></body></html>
